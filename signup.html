<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스비 - 회원가입</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #F4F6FA 0%, #EBF2FD 100%);
    overflow: hidden;
  }

  .login-container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    animation: fadeInUp 0.5s ease both;
  }

  .login-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .logo-mark { width: 42px; height: 42px; background: var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; color: white; box-shadow: 0 4px 12px rgba(26,111,232,0.3); }
  .logo-text { font-size: 24px; font-weight: 900; color: var(--accent-dk); }
  .logo-text span { color: var(--accent); }

  .login-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 36px;
    box-shadow: 0 20px 50px rgba(26,35,64,0.08);
    position: relative;
    overflow: hidden;
  }

  .login-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
    opacity: 0.02;
    pointer-events: none;
  }

  .card-title {
    font-size: 18px;
    font-weight: 900;
    color: var(--accent-dk);
    margin-bottom: 24px;
  }

  .form-group { margin-bottom: 20px; }
  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-sub);
    margin-bottom: 8px;
  }
  .input-wrapper { position: relative; }
  .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    color: var(--muted);
  }
  .form-input {
    width: 100%;
    padding: 13px 14px 13px 42px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    transition: all 0.2s;
    background: var(--bg);
  }
  .form-input:focus {
    outline: none;
    border-color: var(--accent);
    background: white;
    box-shadow: 0 0 0 4px var(--accent-lt);
  }

  .login-btn {
    width: 100%;
    padding: 14px;
    font-size: 15px;
    margin-top: 10px;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 15px;
    margin: 28px 0;
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .social-login {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .social-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: white;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.18s;
  }
  .social-btn:hover {
    border-color: var(--accent);
    background: var(--accent-lt);
  }

  .login-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
    color: var(--muted);
  }
  .login-footer a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 700;
  }
  .login-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="login-container">
  <div class="login-logo">
    <div class="logo-mark">스</div>
    <div class="logo-text">스비 <span>Study</span></div>
  </div>

  <div class="login-card">
    <div class="card-title">회원가입</div>

    <form id="signup-form" onsubmit="handleSignUp(event)">
      <div class="form-group">
        <label class="form-label">이름</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input type="text" class="form-input" placeholder="홍길동" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">이메일 주소</label>
        <div class="input-wrapper">
          <span class="input-icon">📧</span>
          <input type="email" class="form-input" placeholder="example@study.com" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" class="form-input" placeholder="8자 이상 입력" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호 확인</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input type="password" id="password-confirm" class="form-input" placeholder="비밀번호 재입력" required>
        </div>
        <div id="password-msg" style="font-size:12px; margin-top:6px; display:none;"></div>
      </div>
      <button type="submit" class="btn btn-primary login-btn">무료로 가입하기</button>
    </form>

    <div class="divider">또는 다음으로 계속하기</div>

    <div class="social-login">
      <button class="social-btn" id="google-login-btn">
        <span>🌐</span> Google
      </button>
      <button class="social-btn" id="apple-login-btn">
        <span>🍎</span> Apple
      </button>
    </div>
  </div>

  <div class="login-footer">
    이미 계정이 있으신가요? <a href="login.html">로그인하기</a>
  </div>
</div>

<script>
  const pw = document.getElementById('password');
  const pwc = document.getElementById('password-confirm');
  const msg = document.getElementById('password-msg');

  pwc.addEventListener('input', () => {
    if (!pwc.value) { msg.style.display = 'none'; return; }
    if (pw.value === pwc.value) {
      msg.style.display = 'block';
      msg.style.color = '#065F46';
      msg.textContent = '✅ 비밀번호가 일치합니다.';
    } else {
      msg.style.display = 'block';
      msg.style.color = '#DC2626';
      msg.textContent = '❌ 비밀번호가 일치하지 않습니다.';
    }
  });

  document.getElementById('signup-form').addEventListener('submit', (e) => {
    if (pw.value !== pwc.value) {
      e.preventDefault();
      pwc.focus();
    }
  });
</script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, updateProfile, GoogleAuthProvider, OAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCf6mosg_McII4o4INE1WtZbiNym7On_ns",
    authDomain: "svi-study.firebaseapp.com",
    projectId: "svi-study",
    storageBucket: "svi-study.firebasestorage.app",
    messagingSenderId: "780797547188",
    appId: "1:780797547188:web:20c77ac86661105fdbbde1",
    measurementId: "G-EXRS658K37"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  function getTodayString() {
    return new Date().toISOString().split('T')[0];
  }

  async function createUserDoc(uid, name, email) {
    const today = getTodayString();
    await setDoc(doc(db, 'users', uid), {
      displayName: name,
      email: email,
      createdAt: serverTimestamp(),
      level: 1,
      xp: 0,
      xpToNextLevel: 500,
      streak: 0,
      lastActiveDate: '',
      totalStudyMinutes: 0,
      totalQuestsCompleted: 0,
      grade: ''
    });
    const defaultQuests = [
      { subject: '수학', bookName: '쎈 B단계', title: '쎈 B단계 10문제 풀기', icon: '📐', color: '#6366F1', xpReward: 100, goalCount: 10 },
      { subject: '영어', bookName: '자이스토리', title: '독해 지문 1개 풀기', icon: '📖', color: '#1A6FE8', xpReward: 80, goalCount: 1 },
      { subject: '국어', bookName: '수능특강', title: '현대시 지문 1개 읽기', icon: '📝', color: '#F5A623', xpReward: 60, goalCount: 1 },
    ];
    await Promise.all(defaultQuests.map(q =>
      addDoc(collection(db, 'users', uid, 'quests'), {
        ...q, date: today, doneCount: 0, completed: false, completedAt: null
      })
    ));
  }

  // 이메일 회원가입
  window.handleSignUp = async (event) => {
    event.preventDefault();

    const name = document.querySelector('input[type="text"]').value.trim();
    const email = document.querySelector('input[type="email"]').value.trim();
    const pw = document.getElementById('password').value;
    const pwc = document.getElementById('password-confirm').value;

    if (pw !== pwc) {
      showToast('❌ 비밀번호가 일치하지 않습니다.');
      return;
    }

    const btn = document.querySelector('.login-btn');
    btn.disabled = true;
    btn.textContent = '가입 중...';

    try {
      const result = await createUserWithEmailAndPassword(auth, email, pw);
      await updateProfile(result.user, { displayName: name });
      await createUserDoc(result.user.uid, name, email);
      showToast('✨ 가입을 환영합니다, ' + name + '님!');
      setTimeout(() => { window.location.href = 'index.html'; }, 1500);
    } catch (error) {
      btn.disabled = false;
      btn.textContent = '무료로 가입하기';
      const msgs = {
        'auth/email-already-in-use': '❌ 이미 사용 중인 이메일입니다.',
        'auth/weak-password': '❌ 비밀번호는 6자 이상이어야 합니다.',
        'auth/invalid-email': '❌ 유효하지 않은 이메일 형식입니다.',
      };
      showToast(msgs[error.code] || '❌ 오류: ' + error.message);
    }
  };

  // Google 회원가입
  document.getElementById('google-login-btn').addEventListener('click', async () => {
    const provider = new GoogleAuthProvider();
    try {
      const result = await signInWithPopup(auth, provider);
      showToast('👋 환영합니다, ' + result.user.displayName + '님!');
      setTimeout(() => { window.location.href = 'index.html'; }, 1500);
    } catch (error) {
      showToast('❌ Google 로그인 오류: ' + error.message);
    }
  });

  // Apple 회원가입
  document.getElementById('apple-login-btn').addEventListener('click', async () => {
    const provider = new OAuthProvider('apple.com');
    try {
      const result = await signInWithPopup(auth, provider);
      showToast('👋 환영합니다, ' + (result.user.displayName || '사용자') + '님!');
      setTimeout(() => { window.location.href = 'index.html'; }, 1500);
    } catch (error) {
      showToast('❌ Apple 로그인 오류: ' + error.message);
    }
  });

  function showToast(msg) {
    const t = document.createElement('div');
    t.style.cssText = `
      position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
      z-index: 9999; background: #1A2340; color: white; border-radius: 12px;
      padding: 13px 20px; font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px; font-weight: 700; box-shadow: 0 8px 24px rgba(26,35,64,0.18);
    `;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => {
      t.style.opacity = '0';
      t.style.transition = 'opacity 0.25s';
      setTimeout(() => t.remove(), 250);
    }, 2200);
  }
</script>
</body>
</html>
